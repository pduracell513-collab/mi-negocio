<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Ropa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fff;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
}

/* GRID DE PRODUCTOS */
.productos {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    text-align: center;
}

/* IMAGEN */
.card img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
}

/* NOMBRE */
.card h3 {
    font-size: 14px;
    margin: 10px 0 5px;
    font-weight: normal;
}

/* PRECIO */
.card p {
    font-size: 14px;
    font-weight: bold;
}

/* BOTÓN */
.btn {
    display: inline-block;
    margin-top: 8px;
    padding: 8px 12px;
    background: #25D366;
    color: white;
    text-decoration: none;
    font-size: 12px;
    border-radius: 5px;
}

/* EFECTO HOVER */
.card img:hover {
    opacity: 0.85;
    transition: 0.3s;
}

/* RESPONSIVE */
@media (max-width: 900px) {
    .productos {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 500px) {
    .productos {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<header>
